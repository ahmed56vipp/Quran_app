name: quran_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/ 

  fonts:
    - family: ahmed
      fonts:
        - asset: assets/ahmed.ttf
  dev_dependencies:
  flutter_test:
    sdk: flutter
  # أضف هذه الحزمة هنا
  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png" 
  min_sdk_andr
