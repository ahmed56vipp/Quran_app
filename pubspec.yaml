name: quran_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/quran_data.json
    - assets/quran_full.json
    - assets/Aa.png
    - assets/mk.png
    - assets/md.png
  fonts:
    - family: ahmed
      fonts:
        - asset: assets/ahmed.ttf
