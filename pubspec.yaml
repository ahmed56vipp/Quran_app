name: quran_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.3
  just_audio: ^0.9.43 # المكتبة الحالية لتشغيل الصوتيات
  path_provider: ^2.1.3 # لتحديد مسار حفظ الملفات الصوتية في ذاكرة الجهاز
  dio: ^5.5.0 # لتنزيل ملفات الـ MP3 من السيرفر وعرض نسبة التقدم
  archive: ^3.6.1 # المكتبة الجديدة المضافة لفك ضغط ملفات سيرفرات القراء في الذاكرة

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/surah/
    - assets/translation/ar/
    - assets/translation/en/
    - assets/translation/id/
    - assets/icon/
    - assets/audio/
    - assets/audiourls/ # المجلد الجديد المخصص لوضع ملفات الـ zip (مثل 45.zip و 123.zip) فيه
    - assets/readers.json # ملف قائمة القراء الكامل الذي يحتوي على الـ IDs والأسماء

  fonts:
    - family: nam
      fonts:
        - asset: assets/fonts/surah_nam.ttf 

    - family: bsm60
      fonts:
        - asset: assets/fonts/bsmla60.ttf 

    - family: nss
      fonts:
        - asset: assets/fonts/sura_nss.otf 

    - family: quran_num
      fonts:
        - asset: assets/fonts/123456.ttf 

    - family: jzu12
      fonts:
        - asset: assets/fonts/jzu12.ttf 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
